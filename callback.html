<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GARRABot - Conectando...</title>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        Conectando ao servidor do bot...
    </p>
    <script>
        // 1. Pega o código que a Deriv enviou
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        // 2. Busca dupla nas memórias
        const verifier = localStorage.getItem('pkce_verifier') || sessionStorage.getItem('pkce_verifier');

        if (code && verifier) {
            // 3. ENVIAR PARA O SEU SERVIDOR NO RENDER
            fetch('https://garrabot-servidor-final.onrender.com/auth/deriv', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: code,
                    verifier: verifier
                })
            })
            .then(res => res.json())
            .then(data => {
                localStorage.removeItem('pkce_verifier');
                sessionStorage.removeItem('pkce_verifier');
                alert("✅ GARRABot Conectado com Sucesso!");
            })
            .catch(err => {
                console.error(err);
                alert("❌ Erro ao avisar o servidor do bot.");
            });
        } else {
            // 🔍 CÓDIGO DE DIAGNÓSTICO: Mostra exatamente o que há na memória do seu navegador
            const localKeys = Object.keys(localStorage).join(", ") || "vazio";
            const sessionKeys = Object.keys(sessionStorage).join(", ") || "vazio";
            
            alert(`❌ Erro: Verificador não encontrado.\n\n` +
                  `DIAGNÓSTICO DO SEU NAVEGADOR:\n` +
                  `• Código na URL: ${code ? "✓ Encontrado" : "✗ Não encontrado"}\n` +
                  `• Chaves no LocalStorage: [${localKeys}]\n` +
                  `• Chaves no SessionStorage: [${sessionKeys}]\n\n` +
                  `Por favor, me diga o que apareceu escrito neste alerta!`);
        }
    </script>
</body>
</html>
