<script>
    // 1. Pega o código que a Deriv enviou
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');
    
    // 2. Recupera o verificador que salvamos no sessionStorage
    const verifier = sessionStorage.getItem('pkce_verifier');

    if (code && verifier) {
        // 3. Redireciona de volta para a plataforma Bot Garra com código + verifier
        const redirectUrl = `https://botgarra-nnpr7x22.manus.space/callback?code=${code}&state=${state}&verifier=${verifier}`;
        window.location.href = redirectUrl;
    } else {
        alert("❌ Erro: code=" + code + ", verifier=" + verifier );
    }
</script>
