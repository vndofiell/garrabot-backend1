<script>
    // 1. Pega o código e o estado que a Deriv enviou na URL
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');

    if (code) {
        // 2. Redireciona de volta para o Bot Garra apenas com o code e o state.
        // O site do Bot Garra será responsável por recuperar o 'verifier' do próprio sessionStorage dele.
        const redirectUrl = `https://botgarra-nnpr7x22.manus.space/callback?code=${code}&state=${state}`;
        window.location.href = redirectUrl;
    } else {
        alert("❌ Erro: Código de autorização (code ) não encontrado na URL.");
    }
</script>
