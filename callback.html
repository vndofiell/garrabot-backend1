<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>GARRABot - Conectando...</title>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        Conectando ao servidor do bot...
    </p>
    <script>
        // 1. Pega o código que a Deriv enviou na URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        // 2. Busca dupla resiliente: tenta ler do localStorage E do sessionStorage
        const verifier = localStorage.getItem('pkce_verifier') || sessionStorage.getItem('pkce_verifier');

        if (code && verifier) {
            // 3. ENVIAR PARA O SEU SERVIDOR NO RENDER
            fetch('https://garrabot-servidor-final.onrender.com/auth/deriv', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: code,
                    verifier: verifier
                })
            })
            .then(res => res.json())
            .then(data => {
                // Limpa as chaves de segurança por boas práticas
                localStorage.removeItem('pkce_verifier');
                sessionStorage.removeItem('pkce_verifier');
                localStorage.removeItem('oauth_state');
                sessionStorage.removeItem('oauth_state');

                alert("✅ GARRABot Conectado com Sucesso!");
                console.log(data);
            })
            .catch(err => {
                console.error(err);
                alert("❌ Erro ao avisar o servidor do bot.");
            });
        } else {
            alert("❌ Erro: Código ou Verificador não encontrados.");
        }
    </script>
</body>
</html>
