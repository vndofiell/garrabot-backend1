<script>
    // 1. Pega o código que a Deriv enviou
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    
    // 2. Recupera o verificador que salvamos no index.html
    const verifier = sessionStorage.getItem('pkce_verifier');

    if (code && verifier) {
        // 3. ENVIAR PARA O SEU SERVIDOR NO RENDER
        // Substituí pelo seu link oficial que apareceu no log
        fetch('https://garrabot-servidor-final.onrender.com/auth/deriv', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                code: code,
                verifier: verifier
            })
        })
        .then(res => res.json())
        .then(data => {
            alert("✅ GARRABot Conectado com Sucesso!");
            console.log(data);
            // O robô já recebeu o token e já está rodando lá no Render!
        })
        .catch(err => {
            console.error(err);
            alert("❌ Erro ao avisar o servidor do bot.");
        });
    } else {
        alert("❌ Erro: Código ou Verificador não encontrados.");
    }
</script>
