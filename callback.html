<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connecting...</title>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px;">
        Redirecting back to your bot...
    </p>
    <script>
        // 1. Obtém o código e o estado que a Deriv enviou
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');

        // 2. Busca o verificador de segurança de forma resiliente em todas as memórias possíveis
        const verifier = sessionStorage.getItem('pkce_verifier') || 
                         localStorage.getItem('pkce_verifier') || 
                         sessionStorage.getItem('code_verifier') || 
                         localStorage.getItem('code_verifier');

        if (code && verifier) {
            // Endereço padrão caso o 'state' falhe
            let targetUrl = "https://botgarra-nnpr7x22.manus.space/api/oauth/callback";
            
            // 3. Descodifica dinamicamente o parâmetro 'state' para obter a URL correta do bot
            try {
                if (state) {
                    const decodedState = atob(state);
                    if (decodedState.startsWith("http")) {
                        targetUrl = decodedState;
                    }
                }
            } catch (e) {
                console.error("Error decoding state:", e);
            }

            // 4. Redireciona de volta para a rota de callback do bot enviando todos os parâmetros necessários
            const redirectUrl = `${targetUrl}?code=${code}&state=${state}&verifier=${verifier}`;
            window.location.href = redirectUrl;
        } else {
            // Exibe mensagem amigável caso falte alguma chave para depuração
            document.body.innerHTML = `
                <div style="font-family: sans-serif; text-align: center; margin-top: 50px;">
                    <p style="color: red; font-weight: bold; font-size: 16px;">❌ Error: Code or Verifier not found.</p>
                    <p style="color: #666; font-size: 12px;">
                        Code: ${code ? "✓ Found" : "✗ Not Found"} | 
                        Verifier: ${verifier ? "✓ Found" : "✗ Not Found"}
                    </p>
                </div>
            `;
        }
    </script>
</body>
</html>
